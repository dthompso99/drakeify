version: '3.8'

services:
  # Main Drakeify Proxy
  drakeify:
    build:
      context: .
      args:
        LLM_MODEL: llama3.1:latest
        LLM_ENDPOINT: /v1/chat/completions
        CONTEXT_SIZE: "32768"
        STREAM: "true"
        HEADLESS: "true"
        PROXY_PORT: "8082"
        PROXY_HOST: 0.0.0.0
        LOG_LEVEL: info
        ALLOW_HTTP: "true"
        HTTP_MAX_RESPONSE_SIZE: "10485760"
    ports:
      - "8082:8082"
    environment:
      # Database Configuration (SQLite by default)
      DATABASE_URL: sqlite:///data/drakeify.db

      # LLM Configuration
      DRAKEIFY_LLM_HOST: http://10.100.0.11:11434
      DRAKEIFY_LLM_MODEL: llama3.1:latest
      DRAKEIFY_LLM_ENDPOINT: /v1/chat/completions
      DRAKEIFY_CONTEXT_SIZE: "32768"
      DRAKEIFY_STREAM: "true"

      # Proxy Mode
      DRAKEIFY_HEADLESS: "true"
      DRAKEIFY_PROXY_PORT: "8082"
      DRAKEIFY_PROXY_HOST: 0.0.0.0

      # Logging
      DRAKEIFY_LOG_LEVEL: info

      # HTTP Configuration
      DRAKEIFY_ALLOW_HTTP: "true"
      DRAKEIFY_HTTP_TIMEOUT_SECS: "30"
      DRAKEIFY_HTTP_MAX_RESPONSE_SIZE: "10485760"

    volumes:
      # Bind mount local data directory for development-friendly access
      - ./data:/data

    restart: unless-stopped

  # Drakeify Web UI (Sidecar)
  drakeify-web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "3974:3974"
    environment:
      # Database Configuration (shared SQLite database with main proxy)
      DATABASE_URL: sqlite:///data/drakeify.db

      # Authentication Token
      DRAKEIFY_WEB_TOKEN: ${DRAKEIFY_WEB_TOKEN:-change_me_in_production}

    volumes:
      # Share the same data directory as the main proxy
      - ./data:/data

    restart: unless-stopped

# No named volumes needed - using bind mounts for development

